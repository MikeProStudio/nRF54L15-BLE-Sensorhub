<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XIAO Sensor Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --border-radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 800px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
        }

        button {
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 16px;
            background-color: var(--primary);
            color: white;
        }
        
        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover:not(:disabled) { background-color: #dc2626; }

        .status-badge {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background-color: #334155;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 32px;
        }
        .status-badge.connected { background-color: #064e3b; color: var(--success); }

        .widget {
            background-color: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }

        .widget h3 {
            margin: 0 0 16px 0;
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .raw-log {
            font-family: monospace;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            word-wrap: break-word;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>XIAO Dashboard</h1>
        <div class="subtitle">IMU Live Data</div>

        <button id="connectBtn">Connect to nRF54L15</button>
        <button id="disconnectBtn" class="btn-danger" style="display: none;">Disconnect</button>
        
        <div id="status" class="status-badge">Disconnected</div>

        <!-- IMU Widget -->
        <div class="widget">
            <h3>Accelerometer (g)</h3>
            <canvas id="imuChart"></canvas>
        </div>

        <div class="widget" style="margin-top: 20px;">
            <h3>Microphone RMS Audio Level</h3>
            <canvas id="micChart"></canvas>
        </div>

        <div id="rawLog" class="raw-log">Waiting for data...</div>
    </div>

    <script>
        const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const NUS_RX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const NUS_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // Notify char

        let bleDevice;
        let bleServer;
        let txCharacteristic;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusDiv = document.getElementById('status');
        
        const rawLog = document.getElementById('rawLog');

        let imuChart;
        let micChart;

        function updateUI(connected) {
            connectBtn.style.display = connected ? 'none' : 'block';
            disconnectBtn.style.display = connected ? 'block' : 'none';
            
            if (connected) {
                statusDiv.innerText = 'Connected';
                statusDiv.classList.add('connected');
            } else {
                statusDiv.innerText = 'Disconnected';
                statusDiv.classList.remove('connected');
            }
        }

        async function connect() {
            try {
                statusDiv.innerText = 'Requesting Bluetooth Device...';
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [NUS_SERVICE_UUID] }],
                    optionalServices: [NUS_SERVICE_UUID]
                });

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

                statusDiv.innerText = 'Connecting...';
                bleServer = await bleDevice.gatt.connect();

                const service = await bleServer.getPrimaryService(NUS_SERVICE_UUID);
                txCharacteristic = await service.getCharacteristic(NUS_TX_CHARACTERISTIC_UUID);
                
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleNotifications);

                updateUI(true);
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerText = 'Error: ' + error.message;
                statusDiv.classList.remove('connected');
            }
        }

        function onDisconnected() {
            updateUI(false);
        }

        function disconnect() {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            }
        }

        let buffer = "";

        function handleNotifications(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const str = decoder.decode(value);
            
            buffer += str;
            
            let boundary = buffer.indexOf('}');
            while (boundary !== -1) {
                const packet = buffer.slice(0, boundary + 1);
                buffer = buffer.slice(boundary + 1);
                boundary = buffer.indexOf('}');
                
                try {
                    const data = JSON.parse(packet);
                    updateDashboard(data);
                    rawLog.innerText = packet;
                } catch (e) {
                    // Ignore incomplete fragments
                }
            }
        }

        function updateDashboard(data) {
            if (data.a && data.a.length === 3) {
                updateChart(data.a);
            }
            if (data.m !== undefined) {
                updateMicChart(data.m);
            }
        }
        
        function initChart() {
            const ctx = document.getElementById('imuChart').getContext('2d');
            imuChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(50).fill(0),
                    datasets: [{
                        label: 'X',
                        data: Array(50).fill(0),
                        borderColor: '#ef4444',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4
                    }, {
                        label: 'Y',
                        data: Array(50).fill(0),
                        borderColor: '#3b82f6',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4
                    }, {
                        label: 'Z',
                        data: Array(50).fill(0),
                        borderColor: '#10b981',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4
                    }]
                },
                options: {
                    animation: {
                        duration: 200,
                        easing: 'linear'
                    },
                    scales: {
                        x: {
                            display: false
                        },
                        y: {
                            min: -10,
                            max: 10,
                            ticks: {
                                color: '#94a3b8'
                            },
                            grid: {
                                color: '#334155'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#f8fafc'
                            }
                        }
                    }
                }
            });

            const micCtx = document.getElementById('micChart').getContext('2d');
            micChart = new Chart(micCtx, {
                type: 'bar',
                data: {
                    labels: ['Audio Level'],
                    datasets: [{
                        label: 'RMS',
                        data: [0],
                        backgroundColor: '#8b5cf6',
                        borderColor: '#7c3aed',
                        borderWidth: 1
                    }]
                },
                options: {
                    animation: { duration: 100 },
                    scales: {
                        y: {
                            min: 0,
                            max: 2000,
                            ticks: { color: '#94a3b8' },
                            grid: { color: '#334155' }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateChart(accelData) {
            imuChart.data.labels.shift();
            imuChart.data.labels.push('');
            
            imuChart.data.datasets[0].data.shift();
            imuChart.data.datasets[0].data.push(accelData[0]);

            imuChart.data.datasets[1].data.shift();
            imuChart.data.datasets[1].data.push(accelData[1]);
            
            imuChart.data.datasets[2].data.shift();
            imuChart.data.datasets[2].data.push(accelData[2]);
            
            imuChart.update();
        }

        function updateMicChart(micData) {
            micChart.data.datasets[0].data = [micData];
            micChart.update();
        }

        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        
        window.onload = initChart;
    </script>
</body>
</html>
