CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54L15 Bluetooth LE"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
# Dieser Treiber fehlt bei dir:
CONFIG_AUDIO_DMIC_NRFX_PDM=y
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y


# Für nRF54L15 Bluetooth Stabilität:
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

# Enable the NUS service
CONFIG_BT_NUS=y

CONFIG_PWM=y

# Enable serial and console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Config logger
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_BUFFER_SIZE=4096
CONFIG_LOG_MODE_DEFERRED=y

CONFIG_ASSERT=y

CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096

# I2C and IMU
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_NONE=y

# Audio / PDM Microphone
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_NRFX_PDM=y
CONFIG_NRFX_PDM=y
CONFIG_FPU=y

CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y
