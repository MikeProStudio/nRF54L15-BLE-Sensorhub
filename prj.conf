CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF54L15 Bluetooth LE"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1


# CMSIS-DSP for FFT
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_FASTMATH=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y

CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# Audio / PDM Microphone
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y
CONFIG_AUDIO_DMIC_NRFX_PDM=y
CONFIG_NRFX_PDM=y

CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# General System
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_BT_NUS=y
CONFIG_PWM=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_RUNTIME_FILTERING=y
# Watchdog aktivieren für Production Stability (needs devicetree wdt node)
CONFIG_WATCHDOG=y
CONFIG_ASSERT=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
# Stack-Größen
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Bluetooth Stack
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_BT_HCI_TX_STACK_SIZE=4096
CONFIG_BT_CTLR_TX_PWR_0=y

# Power Management (manual k_sleep/k_cpu_idle for nRF54L15)
# CONFIG_PM=y
# CONFIG_PM_DEVICE=y


# I2C and IMU
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_LSM6DSL_TRIGGER_NONE=y

# ADC for Battery Monitoring
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

# BLE Services
CONFIG_BT_BAS=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_STR_MAX=32

# Logging optimiert für Production
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_DEFERRED=y
